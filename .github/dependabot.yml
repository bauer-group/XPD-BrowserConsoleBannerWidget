# =============================================================================
# Dependabot Configuration
# =============================================================================

version: 2
updates:
  # ---------------------------------------------------------------------------
  # GitHub Actions
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"
      - "dependabot"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # npm (build + deploy + test tooling)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
    groups:
      build-tooling:
        patterns:
          - "esbuild"
      test-tooling:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      deploy-sdk:
        patterns:
          - "@aws-sdk/*"
          - "cloudflare"
      dev-tooling:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "globals"
          - "prettier*"
          - "husky"
          - "lint-staged"
          - "rimraf"
