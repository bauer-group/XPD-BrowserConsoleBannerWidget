name: 📚 Deploy Pages (Demo Preview)

# Publishes a live preview of the widget to GitHub Pages: the demo page plus
# the freshly built artifacts, wired so the demo loads Stage-1/Stage-2 from
# the same relative paths it uses locally. Production delivery to the CDN
# happens from deploy-cdn.yml (R2), not from here.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'demo/**'
      - 'scripts/build.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build
        run: npm run build

      - name: 🧱 Assemble preview site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/demo _site/dist
          cp -r dist/* _site/dist/
          cp demo/index.html _site/demo/index.html
          # Root redirect → /demo/ (the demo references ../dist/v1/… which
          # resolves to /dist/v1/… from the /demo/ path).
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=./demo/">\n' > _site/index.html

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v6

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: 🚀 Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
